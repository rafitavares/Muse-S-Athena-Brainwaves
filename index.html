<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Athena Neuro-Hub v2</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header class="dashboard-header">
        <div class="main-controls">
            <button id="btn-run" class="btn active">Run</button>
            <button id="btn-hold" class="btn">Hold</button>
            <button id="btn-record" class="btn btn-rec">⏺ Record</button>
        </div>
        <div class="connection-status">
            <span id="status-text">Disconnected</span>
            <button id="btn-connect" class="btn-connect">Connect Muse</button>
        </div>
    </header>

    <div class="dashboard-grid">
        <aside class="brain-waves-panel">
            <h3>Brain Waves (%)</h3>
            <div class="wave-item">
                <label>Gamma (30-80Hz) <span id="txt-gamma">0%</span></label>
                <div class="bar-bg"><div id="bar-gamma" class="bar-fill gamma"></div></div>
            </div>
            <div class="wave-item">
                <label>Beta (12-30Hz) <span id="txt-beta">0%</span></label>
                <div class="bar-bg"><div id="bar-beta" class="bar-fill beta"></div></div>
            </div>
            <div class="wave-item">
                <label>Alpha (8-12Hz) <span id="txt-alpha">0%</span></label>
                <div class="bar-bg"><div id="bar-alpha" class="bar-fill alpha"></div></div>
            </div>
            <div class="wave-item">
                <label>Theta (4-8Hz) <span id="txt-theta">0%</span></label>
                <div class="bar-bg"><div id="bar-theta" class="bar-fill theta"></div></div>
            </div>
            <div class="wave-item">
                <label>Delta (0.5-4Hz) <span id="txt-delta">0%</span></label>
                <div class="bar-bg"><div id="bar-delta" class="bar-fill delta"></div></div>
            </div>
        </aside>

        <aside class="binaural-panel">
            <h3>Binaural Controls</h3>
            <div class="input-group">
                <label>Target (Hz):</label>
                <input type="number" id="bin-target" value="10">
            </div>
            <div class="input-group">
                <label>Carrier (Hz):</label>
                <input type="number" id="bin-carrier" value="400">
            </div>
            <button id="btn-audio" class="btn-audio">Start Audio</button>
        </aside>

        <section class="charts-section">
            <div class="chart-box">
                <canvas id="chart-freq"></canvas>
            </div>
            <div class="chart-box-small">
                <canvas id="chart-spo2"></canvas>
            </div>
            <div class="chart-box-small">
                <canvas id="chart-pulse"></canvas>
            </div>
        </section>
    </div>

    <div id="modal-save" class="modal hidden">
        <div class="modal-content">
            <h3>Save Recording</h3>
            <input type="text" id="filename-input">
            <textarea id="notes-input" placeholder="Add session notes..."></textarea>
            <div class="modal-btns">
                <button id="btn-save-confirm">Save CSV</button>
                <button id="btn-save-cancel">Discard</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
