<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>Athena App</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/rxjs/6.6.7/rxjs.umd.min.js"></script>
    <script src="https://unpkg.com/muse-js@3.3.0/dist/muse.js"></script>
</head>
<body>
    <header class="ios-header">
        <h1>Athena</h1>
        <div class="connection-panel">
            <button id="btn-connect" class="ios-btn">Conectar Muse</button>
            <span id="bt-status" class="status-disconnected">Desconectado</span>
        </div>
    </header>

    <main class="ios-main">
        <section id="app-monitor" class="app-view active">
            <div class="ios-card">
                <h2>Ondas em Tempo Real</h2>
                <div class="controls">
                    <label>Suavização (segundos):</label>
                    <input type="number" id="smoothing-window" value="3" min="1" max="10" class="ios-input">
                </div>
                <div class="chart-container">
                    <canvas id="monitor-chart"></canvas>
                </div>
            </div>
        </section>

        <section id="app-meditation" class="app-view hidden">
            <div class="ios-card">
                <h2>Meditação Binaural</h2>
                <div class="warning">🎧 Use fones de ouvido estéreo.</div>
                
                <div class="controls-stack">
                    <div class="control-row">
                        <label>Ouvido Esq: <span id="val-left">200</span>Hz</label>
                        <input type="range" id="freq-left" min="100" max="400" value="200" class="ios-slider">
                    </div>
                    <div class="control-row">
                        <label>Ouvido Dir: <span id="val-right">210</span>Hz</label>
                        <input type="range" id="freq-right" min="100" max="400" value="210" class="ios-slider">
                    </div>
                    <div class="beat-display">
                        Frequência Alvo: <strong id="beat-freq">10 Hz (Alpha)</strong>
                    </div>
                    <div class="audio-buttons">
                        <button id="btn-audio-play" class="ios-btn btn-play">▶ Iniciar</button>
                        <button id="btn-audio-stop" class="ios-btn btn-stop">■ Parar</button>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="meditation-chart"></canvas>
                </div>
            </div>
        </section>

        <section id="app-sleep" class="app-view hidden">
            <div class="ios-card">
                <h2>Monitor de Sono</h2>
                <div class="controls">
                    <label>Janela (minutos):</label>
                    <input type="number" id="sleep-window" value="10" min="1" max="600" class="ios-input">
                </div>
                <button id="btn-export" class="ios-btn btn-export">Exportar CSV</button>
                <div class="chart-container sleep-chart-wrapper">
                    <canvas id="sleep-chart"></canvas>
                </div>
            </div>
        </section>
    </main>

    <nav id="main-menu" class="ios-tab-bar">
        <button class="nav-btn active" data-target="app-monitor">
            <span class="icon">🧠</span><br>Monitor
        </button>
        <button class="nav-btn" data-target="app-meditation">
            <span class="icon">🎧</span><br>Binaural
        </button>
        <button class="nav-btn" data-target="app-sleep">
            <span class="icon">🌙</span><br>Sono
        </button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
